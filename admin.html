<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Quản Trị Đơn Hàng | FitLife Admin</title>
    
    <!-- CSS chính -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase Client từ CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        .admin-login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <!-- Khóa Bảo mật Admin -->
    <div id="admin-auth-overlay" class="admin-login-overlay">
        <div class="calc-card" style="max-width: 400px; width: 100%; text-align: center; margin: 20px;">
            <h2 style="font-family: var(--font-serif); color: var(--primary); margin-bottom: 8px;">Quản Trị Hệ Thống</h2>
            <p style="margin-bottom: 24px; font-size: 0.9rem;">Vui lòng nhập mật khẩu quản trị để tiếp tục.</p>
            
            <form id="admin-auth-form">
                <div class="form-group" style="text-align: left;">
                    <label for="admin-password">Mật khẩu Admin</label>
                    <input type="password" id="admin-password" required placeholder="Nhập mật khẩu..." autofocus>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;" id="auth-submit-btn">Xác Thực</button>
            </form>
            <a href="index.html" style="display: inline-block; margin-top: 16px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Quay về Trang chủ</a>
        </div>
    </div>

    <!-- Layout Quản Trị Chính (Ẩn lúc đầu) -->
    <div id="admin-dashboard-section" style="display: none;">
        <!-- Header -->
        <header>
            <div class="container">
                <nav>
                    <a href="index.html" class="logo">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="3" x2="9" y2="21"></line>
                        </svg>
                        FitLife Admin Panel
                    </a>
                    <div style="font-weight: 600; font-size: 0.95rem; color: var(--primary);">
                        Chế độ: Toàn quyền quản trị
                    </div>
                    <div class="nav-actions">
                        <button class="theme-toggle" id="admin-theme-toggle" aria-label="Toggle theme"></button>
                        <button class="btn" id="admin-logout-btn" style="padding: 8px 16px;">Đăng Xuất</button>
                    </div>
                </nav>
            </div>
        </header>

        <!-- Bảng điều khiển -->
        <div class="container admin-container">
            <div class="admin-grid">
                <div class="admin-table-card">
                    <div class="admin-table-header">
                        <h2 style="font-family: var(--font-serif); font-size: 1.5rem;">Danh Sách Đơn Hàng Đăng Ký</h2>
                        <button class="btn btn-primary" id="refresh-orders-btn" style="padding: 8px 16px;">Tải lại dữ liệu</button>
                    </div>
                    
                    <div style="overflow-x: auto;">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Khách Hàng</th>
                                    <th>Email / SĐT</th>
                                    <th>Mã Kích Hoạt</th>
                                    <th>Chỉ Số BMI/TDEE</th>
                                    <th>Lượt Hỏi AI</th>
                                    <th>Trạng Thái</th>
                                    <th>Hành Động</th>
                                </tr>
                            </thead>
                            <tbody id="orders-table-body">
                                <tr>
                                    <td colspan="7" style="text-align: center; color: var(--text-muted);">Đang tải dữ liệu đơn hàng...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script cấu hình -->
    <script src="config.js"></script>
    <script>
        // Logic trang Quản trị Admin
        const ADMIN_PASSWORD_HASH = "thubay2026"; // Mật khẩu quản trị đơn giản

        document.addEventListener("DOMContentLoaded", () => {
            initAdminTheme();
            checkAdminSession();
            initAuthForm();
            initDashboardControls();
        });

        // 1. Quản lý Theme trong admin
        function initAdminTheme() {
            const themeToggle = document.getElementById("admin-theme-toggle");
            if (!themeToggle) return;

            const savedTheme = localStorage.getItem("theme") || "light";
            document.documentElement.setAttribute("data-theme", savedTheme);

            themeToggle.addEventListener("click", () => {
                const currentTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
                document.documentElement.setAttribute("data-theme", currentTheme);
                localStorage.setItem("theme", currentTheme);
            });
        }

        // 2. Xác thực Admin
        function checkAdminSession() {
            if (sessionStorage.getItem("admin_auth") === "true") {
                showDashboard();
            }
        }

        function initAuthForm() {
            const form = document.getElementById("admin-auth-form");
            form.addEventListener("submit", (e) => {
                e.preventDefault();
                const pass = document.getElementById("admin-password").value;
                
                if (pass === ADMIN_PASSWORD_HASH) {
                    sessionStorage.setItem("admin_auth", "true");
                    showDashboard();
                } else {
                    alert("Mật khẩu quản trị chưa chính xác. Vui lòng thử lại!");
                    document.getElementById("admin-password").value = "";
                }
            });
        }

        function showDashboard() {
            document.getElementById("admin-auth-overlay").style.display = "none";
            document.getElementById("admin-dashboard-section").style.display = "block";
            loadOrdersData();
        }

        // 3. Tải danh sách đơn hàng từ Supabase
        async function loadOrdersData() {
            const tableBody = document.getElementById("orders-table-body");
            tableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">Đang tải dữ liệu đơn hàng...</td></tr>`;

            try {
                if (!supabaseClient) {
                    throw new Error("Không thể kết nối Supabase client.");
                }

                // Lấy đơn hàng mới nhất xếp lên đầu
                const { data, error } = await supabaseClient
                    .from("orders")
                    .select("*")
                    .order("created_at", { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">Chưa có đơn hàng nào được tạo.</td></tr>`;
                    return;
                }

                tableBody.innerHTML = "";
                data.forEach(order => {
                    const row = document.createElement("tr");
                    
                    const bmiDisplay = order.bmi ? `BMI: ${order.bmi} | TDEE: ${order.tdee}` : "Chưa tính";
                    const statusClass = order.status === "approved" ? "status-approved" : "status-pending";
                    const statusLabel = order.status === "approved" ? "Đã Kích Hoạt" : "Đang Chờ";

                    let actionBtn = "";
                    if (order.status === "pending") {
                        actionBtn = `<button class="btn btn-primary" onclick="approveOrder(${order.id})" style="padding: 4px 8px; font-size: 0.8rem;">Duyệt Đơn</button>`;
                    } else {
                        actionBtn = `<button class="btn" onclick="rejectOrder(${order.id})" style="padding: 4px 8px; font-size: 0.8rem; border-color: var(--error); color: var(--error);">Hủy Duyệt</button>`;
                    }

                    row.innerHTML = `
                        <td><strong>${order.name}</strong></td>
                        <td>
                            <div>${order.email}</div>
                            <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;">SĐT: ${order.phone}</div>
                        </td>
                        <td><span style="font-family: monospace; font-weight: 700; color: var(--primary); font-size: 1rem;">${order.access_code}</span></td>
                        <td style="font-size: 0.85rem;">${bmiDisplay}</td>
                        <td style="text-align: center;">${order.ai_questions_left}</td>
                        <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                        <td>${actionBtn}</td>
                    `;
                    tableBody.appendChild(row);
                });

            } catch (err) {
                console.error("Lỗi tải đơn hàng:", err);
                tableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--error);">Không thể tải dữ liệu: ${err.message}</td></tr>`;
            }
        }

        // Duyệt đơn hàng
        async function approveOrder(id) {
            if (!confirm("Xác nhận kích hoạt mã cho đơn hàng này?")) return;
            
            try {
                const { error } = await supabaseClient
                    .from("orders")
                    .update({ status: "approved" })
                    .eq("id", id);

                if (error) throw error;
                loadOrdersData(); // Tải lại bảng
            } catch (err) {
                alert("Duyệt đơn lỗi: " + err.message);
            }
        }

        // Hủy duyệt đơn hàng
        async function rejectOrder(id) {
            if (!confirm("Xác nhận hủy trạng thái kích hoạt của đơn hàng này?")) return;
            
            try {
                const { error } = await supabaseClient
                    .from("orders")
                    .update({ status: "pending" })
                    .eq("id", id);

                if (error) throw error;
                loadOrdersData();
            } catch (err) {
                alert("Hủy duyệt đơn lỗi: " + err.message);
            }
        }

        // Nút điều khiển Dashboard
        function initDashboardControls() {
            document.getElementById("refresh-orders-btn").addEventListener("click", loadOrdersData);
            
            document.getElementById("admin-logout-btn").addEventListener("click", () => {
                sessionStorage.removeItem("admin_auth");
                location.reload();
            });
        }
    </script>
</body>
</html>
